interval=persist
markup=pango

[ip]
command=hostname -i | awk '{print $1}'
interval=once
color=#52263e

[bandwidth]
command=~/.config/i3/scripts/bandwidth
WARN_RX=307200
WARN_TX=30720
CRIT_RX=512000
CRIT_TX=51200

[cpu_usage]
command=~/.config/i3/scripts/cpu_usage
WARN_PERCENT=50
CRIT_PERCENT=80
DECIMALS=2
LABEL=CPU
min_width=CPU 100.00%
REFRESH_TIME=1

[calendar]
command=~/.config/i3/scripts/calendar
interval=1
LABEL=
DATEFMT=+%H:%M:%S
HEIGHT=180
WIDTH=220
